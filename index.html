  <style>
   


:root {
  --red: #C0392B;
  --orange: #E8621A;
  --black: #1A1008;
  --cream: #F2E8D9;
  --grey: #2C2016;
  --grey-light: #3D2E1E;
  --muted: #9A8070;
}

*,*::before,*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--black);
  color: var(--cream);
  font-family: 'Montserrat',sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
  opacity: 0.4;
}
/* LOADER */

#loader {
  position: fixed;
  inset: 0;
  background: var(--black);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.6s ease;
}

#loader.hide {
  opacity: 0;
  pointer-events: none;
}

.loader-logo {
  font-family: 'Cormorant Garamond',serif;
  font-size: 2.5rem;
  font-weight: 600;
  letter-spacing: 4px;
  color: var(--cream);
  margin-bottom: 1rem;
}

.loader-logo span {
  color: var(--orange);
  font-style: italic;
}

.loader-bar {
  width: 200px;
  height: 2px;
  background: rgba(232,98,26,0.2);
  overflow: hidden;
  margin-bottom: 1rem;
}

.loader-fill {
  height: 100%;
  background: var(--orange);
  animation: loaderFill 1.8s ease forwards;
}

.loader-text {
  font-size: 0.6rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
}
/* COOKIE BANNER */

#cookie-banner {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 500;
  background: var(--grey);
  border-top: 1px solid rgba(232,98,26,0.3);
  padding: 1.2rem 3rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 2rem;
  transform: translateY(100%);
  transition: transform 0.5s ease;
}

#cookie-banner.show {
  transform: translateY(0);
}

#cookie-banner p {
  font-size: 0.75rem;
  color: var(--muted);
  line-height: 1.6;
  max-width: 600px;
}

#cookie-banner p a {
  color: var(--orange);
  text-decoration: none;
}

.cookie-btns {
  display: flex;
  gap: 1rem;
  flex-shrink: 0;
}

.cookie-accept {
  background: var(--orange);
  color: var(--black);
  border: none;
  padding: 0.6rem 1.5rem;
  font-family: 'Montserrat',sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.3s;
}

.cookie-accept:hover {
  background: var(--red);
  color: var(--cream);
}

.cookie-decline {
  background: transparent;
  color: var(--muted);
  border: 1px solid rgba(154,128,112,0.3);
  padding: 0.6rem 1.5rem;
  font-family: 'Montserrat',sans-serif;
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
}

.cookie-decline:hover {
  color: var(--cream);
}
/* NAV */

nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.8rem 4rem;
  background: linear-gradient(to bottom,rgba(26,16,8,0.98),transparent);
  transition: background 0.4s;
}

nav.scrolled {
  background: rgba(26,16,8,0.97);
  border-bottom: 1px solid rgba(232,98,26,0.2);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  cursor: pointer;
  font-family: 'Cormorant Garamond',serif;
  font-size: 1.5rem;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--cream);
  text-decoration: none;
}
.nav-logo svg { flex-shrink: 0; }

.nav-logo span {
  color: var(--orange);
  font-style: italic;
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 2rem;
  align-items: center;
}

.nav-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  transition: color 0.3s;
}

.nav-links a:hover {
  color: var(--cream);
}

.nav-cta {
  background: var(--orange)!important;
  color: var(--black)!important;
  padding: 0.6rem 1.5rem!important;
  font-weight: 600!important;
}

.nav-cta:hover {
  background: var(--red)!important;
  color: var(--cream)!important;
}

/* HAMBURGER MENU */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
  z-index: 101;
}
.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--cream);
  transition: all 0.3s ease;
  transform-origin: center;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* MOBILE NAV OVERLAY */
.mobile-nav {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,16,8,0.98);
  z-index: 99;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.mobile-nav.open {
  opacity: 1;
  pointer-events: all;
}
.mobile-nav a {
  color: var(--cream);
  text-decoration: none;
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.5rem;
  font-weight: 300;
  letter-spacing: 3px;
  transition: color 0.3s;
}
.mobile-nav a:hover { color: var(--orange); }
.mobile-nav .mobile-cta {
  background: var(--orange);
  color: var(--black)!important;
  padding: 1rem 3rem;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
}
/* TRUST BADGES */

.trust-bar {
  background: var(--grey);
  border-bottom: 1px solid rgba(232,98,26,0.15);
  padding: 0.8rem 4rem;
  display: flex;
  justify-content: center;
  gap: 3rem;
  flex-wrap: wrap;
}

.trust-badge {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.62rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.trust-badge .badge-icon {
  font-size: 1rem;
}

.trust-badge strong {
  color: var(--orange);
}
/* HERO */

.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 8rem 4rem 4rem;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 50%,rgba(232,98,26,0.12) 0%,transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(192,57,43,0.08) 0%,transparent 50%),var(--black);
}

.hero-lines {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(rgba(232,98,26,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(232,98,26,0.05) 1px,transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center,black 20%,transparent 80%);
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 700px;
}

.hero-eyebrow {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 2rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.2s forwards;
}

.hero-eyebrow::before {
  content: '';
  width: 40px;
  height: 1px;
  background: var(--orange);
}

.hero-eyebrow span {
  font-size: 0.65rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--orange);
  font-weight: 500;
}

.hero h1 {
  font-family: 'Cormorant Garamond',serif;
  font-size: clamp(3.5rem,8vw,7rem);
  font-weight: 300;
  line-height: 1.0;
  letter-spacing: -1px;
  margin-bottom: 2rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.4s forwards;
}

.hero h1 em {
  font-style: italic;
  color: var(--orange);
}

.hero-desc {
  font-size: 0.9rem;
  line-height: 2;
  color: var(--muted);
  max-width: 480px;
  margin-bottom: 3rem;
  font-weight: 400;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.6s forwards;
}

.hero-actions {
  display: flex;
  gap: 1.5rem;
  align-items: center;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.8s forwards;
}

.btn-primary {
  background: var(--orange);
  color: var(--black);
  border: none;
  padding: 1rem 2.5rem;
  font-family: 'Montserrat',sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.btn-primary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--red);
  transform: translateX(-100%);
  transition: transform 0.3s;
}

.btn-primary:hover::after {
  transform: translateX(0);
}

.btn-primary span {
  position: relative;
  z-index: 1;
}

.btn-outline {
  background: transparent;
  color: var(--cream);
  border: 1px solid rgba(242,232,217,0.3);
  padding: 1rem 2.5rem;
  font-family: 'Montserrat',sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-outline:hover {
  border-color: var(--orange);
  color: var(--orange);
}

.hero-scroll {
  position: absolute;
  bottom: 3rem;
  left: 4rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 1.2s forwards;
}

.hero-scroll span {
  font-size: 0.6rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
}

.scroll-line {
  width: 60px;
  height: 1px;
  background: var(--muted);
  position: relative;
  overflow: hidden;
}

.scroll-line::after {
  content: '';
  position: absolute;
  left: -100%;
  top: 0;
  width: 100%;
  height: 100%;
  background: var(--orange);
  animation: scrollLine 2s ease infinite;
}
/* TICKER */

.ticker {
  background: var(--orange);
  padding: 0.9rem 0;
  overflow: hidden;
  white-space: nowrap;
}

.ticker-track {
  display: inline-block;
  animation: ticker 25s linear infinite;
}

.ticker-track span {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--black);
  margin: 0 2rem;
}

.ticker-track .dot {
  color: var(--black);
  opacity: 0.4;
  margin: 0;
}
/* COUNTDOWN */

.countdown-section {
  padding: 3rem 4rem;
  background: var(--red);
  text-align: center;
}

.countdown-section h3 {
  font-family: 'Cormorant Garamond',serif;
  font-size: 1.5rem;
  font-weight: 300;
  margin-bottom: 1rem;
  letter-spacing: 2px;
}

.countdown-section h3 em {
  font-style: italic;
}

.countdown-timer {
  display: flex;
  justify-content: center;
  gap: 2rem;
  margin-bottom: 1rem;
}

.countdown-unit {
  text-align: center;
}

.countdown-num {
  font-family: 'Cormorant Garamond',serif;
  font-size: 3rem;
  font-weight: 600;
  color: var(--cream);
  line-height: 1;
  display: block;
}

.countdown-label {
  font-size: 0.72rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(242,232,217,0.6);
}

.countdown-colon {
  font-family: 'Cormorant Garamond',serif;
  font-size: 3rem;
  color: rgba(242,232,217,0.4);
  align-self: flex-start;
  padding-top: 0.1rem;
}

.countdown-note {
  font-size: 0.72rem;
  color: rgba(242,232,217,0.7);
  letter-spacing: 2px;
}
/* SHARED */

.section-tag {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.section-tag::before {
  content: '';
  width: 30px;
  height: 1px;
  background: var(--orange);
}

.section-tag span {
  font-size: 0.6rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--orange);
  font-weight: 500;
}
/* ABOUT */

.about-strip {
  padding: 6rem 4rem;
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  gap: 6rem;
  align-items: center;
  border-bottom: 1px solid rgba(232,98,26,0.15);
}

.about-strip h2 {
  font-family: 'Cormorant Garamond',serif;
  font-size: clamp(2.5rem,4vw,3.5rem);
  font-weight: 300;
  line-height: 1.2;
}

.about-strip h2 em {
  font-style: italic;
  color: var(--orange);
}

.about-text {
  font-size: 0.88rem;
  line-height: 2;
  color: var(--muted);
  margin-bottom: 2.5rem;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 2rem;
  padding-top: 3rem;
  border-top: 1px solid rgba(232,98,26,0.15);
}

.stat-item {
  text-align: center;
}

.stat-num {
  font-family: 'Cormorant Garamond',serif;
  font-size: 3rem;
  font-weight: 300;
  color: var(--orange);
  line-height: 1;
  display: block;
}

.stat-label {
  font-size: 0.6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 0.5rem;
  display: block;
}
/* BUSINESS HOURS */

.hours-section {
  padding: 4rem;
  background: var(--grey-light);
  border-top: 1px solid rgba(232,98,26,0.15);
  border-bottom: 1px solid rgba(232,98,26,0.15);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 2rem;
}

.hours-left h3 {
  font-family: 'Cormorant Garamond',serif;
  font-size: 1.8rem;
  font-weight: 300;
  margin-bottom: 0.5rem;
}

.hours-left h3 em {
  font-style: italic;
  color: var(--orange);
}

.hours-left p {
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 1px;
}

.hours-grid {
  display: flex;
  gap: 3rem;
  flex-wrap: wrap;
}

.hours-item {
  text-align: center;
}

.hours-day {
  font-size: 0.6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 0.4rem;
  display: block;
}

.hours-time {
  font-size: 0.85rem;
  color: var(--cream);
  font-weight: 500;
}

.hours-status {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4CAF50;
  animation: pulse-dot 1.5s ease infinite;
}

.hours-status.open {
  color: #4CAF50;
}
/* PRODUCTS */

.products {
  padding: 6rem 4rem;
}

.products-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 4rem;
}

.products-header h2 {
  font-family: 'Cormorant Garamond',serif;
  font-size: clamp(2.5rem,4vw,3.5rem);
  font-weight: 300;
  line-height: 1.1;
}

.products-header h2 em {
  font-style: italic;
  color: var(--orange);
}

.products-header p {
  font-size: 0.8rem;
  color: var(--muted);
  max-width: 280px;
  text-align: right;
  line-height: 1.8;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
  gap: 1.5px;
  background: rgba(232,98,26,0.1);
  border: 1px solid rgba(232,98,26,0.1);
}

.product-card {
  background: var(--black);
  padding: 0;
  position: relative;
  overflow: hidden;
  transition: background 0.4s, box-shadow 0.4s;
  cursor: pointer;
  display: flex;
  flex-direction: column;
}

.product-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg,rgba(232,98,26,0.06) 0%,transparent 60%);
  opacity: 0;
  transition: opacity 0.4s;
  z-index: 1;
  pointer-events: none;
}

.product-card:hover {
  background: var(--grey);
  box-shadow: 0 0 0 1px rgba(232,98,26,0.4);
}

.product-card:hover::before {
  opacity: 1;
}

/* Product photo header */
.product-photo-wrap {
  position: relative;
  width: 100%;
  height: 200px;
  overflow: hidden;
  background: var(--grey);
  flex-shrink: 0;
